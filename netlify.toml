# Netlify configuration for The Marquee (Flutter web + OAuth proxy function).
#
# Two ways to deploy:
#   1. CLI (build locally, no Flutter in CI):
#        flutter build web --release --dart-define-from-file=config/web.json
#        netlify deploy --prod
#      (uses `publish` + `functions` below; the `command` is skipped)
#
#   2. Git-based (Netlify builds): the `command` installs Flutter and builds,
#      pulling TRAKT_ID / TMDB_READ_TOKEN from Netlify env vars. The client
#      secret is intentionally NOT passed to the client build.

[build]
  command = "if [ ! -x \"$HOME/flutter/bin/flutter\" ]; then rm -rf \"$HOME/flutter\" && git clone https://github.com/flutter/flutter.git --depth 1 -b stable \"$HOME/flutter\"; fi && export PATH=\"$PATH:$HOME/flutter/bin\" && flutter build web --release --dart-define=TRAKT_ID=$TRAKT_ID"
  publish = "build/web"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Entry-point files must always be revalidated, otherwise Safari (and other
# browsers) keep booting a stale main.dart.js from the service worker cache
# and never discover that a new build was deployed.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/flutter_bootstrap.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/flutter_service_worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
